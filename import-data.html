<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据导入 - Supabase</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase-client.js"></script>
  <script src="recipes.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
      color: #333;
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    
    .header {
      text-align: center;
      margin-bottom: 40px;
      color: white;
    }
    
    .header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }
    
    .header p {
      opacity: 0.9;
      font-size: 1.1rem;
    }
    
    .card {
      background: white;
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    
    .card h2 {
      color: #667eea;
      margin-bottom: 20px;
      font-size: 1.5rem;
    }
    
    .step {
      display: flex;
      align-items: flex-start;
      gap: 15px;
      margin-bottom: 20px;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 10px;
    }
    
    .step-number {
      width: 30px;
      height: 30px;
      background: #667eea;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      flex-shrink: 0;
    }
    
    .step-content h3 {
      margin-bottom: 8px;
      color: #333;
    }
    
    .step-content p {
      color: #666;
      line-height: 1.6;
    }
    
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }
    
    .btn-success {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      color: white;
    }
    
    .btn-success:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(17, 153, 142, 0.4);
    }
    
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none !important;
    }
    
    .status {
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      display: none;
    }
    
    .status.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    
    .status.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    
    .status.info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }
    
    .progress {
      margin-top: 20px;
      display: none;
    }
    
    .progress-bar {
      height: 10px;
      background: #e9ecef;
      border-radius: 5px;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      width: 0%;
      transition: width 0.3s ease;
    }
    
    .progress-text {
      text-align: center;
      margin-top: 10px;
      color: #666;
    }
    
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }
    
    .stat-item {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }
    
    .stat-value {
      font-size: 2rem;
      font-weight: bold;
      color: #667eea;
    }
    
    .stat-label {
      color: #666;
      font-size: 0.9rem;
      margin-top: 5px;
    }
    
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: white;
      text-decoration: none;
      margin-top: 20px;
      padding: 10px 20px;
      background: rgba(255,255,255,0.2);
      border-radius: 8px;
      transition: all 0.3s ease;
    }
    
    .back-link:hover {
      background: rgba(255,255,255,0.3);
    }
    
    code {
      background: #f4f4f4;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Consolas', monospace;
      font-size: 0.9em;
    }
    
    pre {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 8px;
      overflow-x: auto;
      margin-top: 10px;
    }
    
    pre code {
      background: none;
      padding: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🗄️ Supabase 数据导入</h1>
      <p>将菜谱数据导入到云端数据库</p>
    </div>
    
    <div class="card">
      <h2>📋 使用步骤</h2>
      
      <div class="step">
        <div class="step-number">1</div>
        <div class="step-content">
          <h3>创建数据库表</h3>
          <p>在 Supabase 的 SQL Editor 中执行 <code>supabase-schema.sql</code> 文件中的SQL语句，创建所需的表结构。</p>
        </div>
      </div>
      
      <div class="step">
        <div class="step-number">2</div>
        <div class="step-content">
          <h3>检查连接</h3>
          <p>点击下方按钮检查与 Supabase 的连接是否正常。</p>
          <button class="btn btn-primary" onclick="checkConnectionStatus()" style="margin-top: 10px;">
            🔍 检查连接
          </button>
        </div>
      </div>
      
      <div class="step">
        <div class="step-number">3</div>
        <div class="step-content">
          <h3>导入数据</h3>
          <p>连接正常后，点击导入按钮将所有菜谱数据上传到数据库。</p>
          <button class="btn btn-success" onclick="importData()" id="importBtn" style="margin-top: 10px;" disabled>
            📤 开始导入数据
          </button>
        </div>
      </div>
    </div>
    
    <div class="card" id="statusCard" style="display: none;">
      <h2>📊 导入状态</h2>
      <div id="statusMessage" class="status"></div>
      
      <div class="progress" id="progressArea">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-text" id="progressText">0 / 0</div>
      </div>
      
      <div class="stats" id="statsArea" style="display: none;">
        <div class="stat-item">
          <div class="stat-value" id="totalCount">0</div>
          <div class="stat-label">总菜谱数</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="successCount">0</div>
          <div class="stat-label">导入成功</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="failedCount">0</div>
          <div class="stat-label">导入失败</div>
        </div>
      </div>
    </div>
    
    <div style="text-align: center;">
      <a href="index.html" class="back-link">← 返回菜谱首页</a>
    </div>
  </div>
  
  <script>
    // 初始化 Supabase
    let isConnected = false;
    
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof initSupabase === 'function') {
        initSupabase();
      }
    });
    
    // 检查连接状态
    async function checkConnectionStatus() {
      showStatus('正在检查连接...', 'info');
      
      try {
        const connected = await checkConnection();
        
        if (connected) {
          isConnected = true;
          showStatus('✅ 连接成功！可以开始导入数据。', 'success');
          document.getElementById('importBtn').disabled = false;
        } else {
          showStatus('❌ 连接失败，请检查网络连接和配置信息。', 'error');
        }
      } catch (err) {
        showStatus('❌ 检查连接时出错: ' + err.message, 'error');
      }
    }
    
    // 导入数据
    async function importData() {
      if (!isConnected) {
        showStatus('请先检查连接状态', 'error');
        return;
      }
      
      const importBtn = document.getElementById('importBtn');
      importBtn.disabled = true;
      importBtn.textContent = '📤 导入中...';
      
      document.getElementById('statusCard').style.display = 'block';
      document.getElementById('progressArea').style.display = 'block';
      showStatus('正在导入数据，请稍候...', 'info');
      
      try {
        // 获取所有菜谱数据
        const allRecipes = typeof recipes !== 'undefined' ? recipes : [];
        
        if (allRecipes.length === 0) {
          showStatus('❌ 没有找到菜谱数据', 'error');
          importBtn.disabled = false;
          importBtn.textContent = '📤 开始导入数据';
          return;
        }
        
        const total = allRecipes.length;
        let success = 0;
        let failed = 0;
        
        // 更新进度显示
        document.getElementById('totalCount').textContent = total;
        
        // 逐个导入
        for (let i = 0; i < allRecipes.length; i++) {
          const recipe = allRecipes[i];
          
          try {
            const result = await addRecipe(recipe);
            
            if (result) {
              success++;
            } else {
              failed++;
              console.error(`导入失败: ${recipe.name}`);
            }
          } catch (err) {
            failed++;
            console.error(`导入出错: ${recipe.name}`, err);
          }
          
          // 更新进度
          const progress = ((i + 1) / total) * 100;
          document.getElementById('progressFill').style.width = progress + '%';
          document.getElementById('progressText').textContent = `${i + 1} / ${total}`;
          document.getElementById('successCount').textContent = success;
          document.getElementById('failedCount').textContent = failed;
          
          // 每10个暂停一下，避免请求过快
          if ((i + 1) % 10 === 0) {
            await new Promise(resolve => setTimeout(resolve, 500));
          }
        }
        
        document.getElementById('statsArea').style.display = 'grid';
        
        if (failed === 0) {
          showStatus(`✅ 导入完成！成功导入 ${success} 条数据。`, 'success');
        } else {
          showStatus(`⚠️ 导入完成。成功: ${success}, 失败: ${failed}`, 'info');
        }
        
      } catch (err) {
        showStatus('❌ 导入过程中出错: ' + err.message, 'error');
      } finally {
        importBtn.disabled = false;
        importBtn.textContent = '📤 开始导入数据';
      }
    }
    
    // 显示状态信息
    function showStatus(message, type) {
      const statusEl = document.getElementById('statusMessage');
      statusEl.textContent = message;
      statusEl.className = 'status ' + type;
      statusEl.style.display = 'block';
      document.getElementById('statusCard').style.display = 'block';
    }
  </script>
</body>
</html>
